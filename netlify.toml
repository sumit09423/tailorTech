# Vite + React (not Next.js). Publish the Vite build output.
[build]
  command = "npm run build"
  publish = "dist"

# Turn off Next.js plugin if it was added in the Netlify UI (this site is Vite).
[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false

# Client-side routing: serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
